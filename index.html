<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WakeHub - Controle Remoto</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}
body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card{
    width:420px;
    max-width:90vw;
    background:#1e293b;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,.45);
}
h1{
    color:#38bdf8;
    margin-bottom:10px;
}
p{
    color:#cbd5e1;
    margin-bottom:25px;
    font-size:14px;
}
#status{
    margin-bottom:20px;
    font-size:13px;
    color:#94a3b8;
}
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}
button:disabled{
    background:#475569;
    cursor:not-allowed;
}
button:hover:not(:disabled){
    background:#0ea5e9;
}
</style>
</head>
<body>
<div class="card">
<h1>WakeHub</h1>
<p>Controle remoto do computador via MQTT</p>
<div id="status">Conectando ao broker...</div>
<button id="btnLigar" onclick="ligarPC()" disabled>Ligar Computador</button>
</div>

<script>
// ===== CONFIGURAÇÃO - preencha com os mesmos dados do config.h do ESP32 =====
const MQTT_BROKER = "wss://9ec6a439faec488a83dfca692d4b7932.s1.eu.hivemq.cloud:8884/mqtt";
const MQTT_USER = "WakeHubUser";
const MQTT_PASSWORD = "23012007";
const MQTT_TOPIC = "wakehub/wake";
const AUTH_TOKEN = "nk2uyYAA8ZcnHUweLJiFinjB99LM223UbwxtPQHnhte2jJwvBT1oAnuKgPJNYCvKQPHpTRyUvZCJFTzissUvdqCfrLLpJ3rQWzs";
// =============================================================================

const statusEl = document.getElementById("status");
const btnEl = document.getElementById("btnLigar");

const client = mqtt.connect(MQTT_BROKER, {
    username: MQTT_USER,
    password: MQTT_PASSWORD,
    clientId: "wakehub-web-" + Math.random().toString(16).slice(2)
});

client.on("connect", () => {
    statusEl.textContent = "Conectado! Pronto para ligar o PC.";
    btnEl.disabled = false;
});

client.on("error", (err) => {
    statusEl.textContent = "Erro de conexão: " + err.message;
    btnEl.disabled = true;
});

client.on("close", () => {
    statusEl.textContent = "Desconectado do broker...";
    btnEl.disabled = true;
});

function ligarPC()
{
    btnEl.disabled = true;
    statusEl.textContent = "Enviando comando...";

    client.publish(MQTT_TOPIC, AUTH_TOKEN, {}, (err) => {
        if (err)
        {
            statusEl.textContent = "Erro ao enviar: " + err.message;
        }
        else
        {
            statusEl.textContent = "Comando enviado! O PC deve ligar em instantes.";
        }
        btnEl.disabled = false;
    });
}
</script>
</body>
</html>
