<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WakeHub</title>

<!-- ===== ÍCONE =====
     Coloque um arquivo "icon.png" (quadrado, recomendo 512x512) na mesma
     pasta do index.html e suba junto pro GitHub Pages. -->
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a2850">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:'Poppins', Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;

    /* ===== TROQUE PELA SUA IMAGEM DE FUNDO =====
       Coloque o arquivo "background.jpg" na mesma pasta do index.html
       e suba os dois juntos pro GitHub Pages. */
    background-image:
        linear-gradient(180deg, rgba(10,40,80,.55), rgba(10,40,80,.75)),
        url("background.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

.card{
    width:440px;
    max-width:100%;
    background:rgba(30, 90, 160, 0.55);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.25);
    border-radius:28px;
    padding:36px 30px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
}

h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:44px;
    color:#ffffff;
    text-shadow:0 3px 10px rgba(0,0,0,.3);
    letter-spacing:1px;
    margin-bottom:14px;
}

.subtitle{
    font-family:'Baloo 2', sans-serif;
    font-weight:500;
    font-size:15px;
    color:#e8f1ff;
    text-transform:uppercase;
    letter-spacing:.5px;
    margin-bottom:22px;
    line-height:1.4;
}

#status{
    font-size:13px;
    color:#cfe0f5;
    margin-bottom:26px;
    min-height:18px;
}

button{
    width:100%;
    padding:17px;
    border:none;
    border-radius:50px;
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.4);
    color:#ffffff;
    font-family:'Poppins', sans-serif;
    font-weight:600;
    font-size:16px;
    cursor:pointer;
    transition:.25s;
}

button:hover:not(:disabled){
    background:rgba(255,255,255,.3);
    transform:translateY(-1px);
}

button:disabled{
    background:rgba(255,255,255,.08);
    color:rgba(255,255,255,.5);
    cursor:not-allowed;
}

button:active:not(:disabled){
    transform:translateY(0);
}

#trocarToken{
    margin-top:16px;
    font-size:12px;
    color:rgba(255,255,255,.55);
    cursor:pointer;
    text-decoration:underline;
}

#trocarToken:hover{
    color:rgba(255,255,255,.8);
}
</style>
</head>
<body>

<div class="card">
    <h1>WAKEHUB</h1>
    <p class="subtitle">Ligue o computador de qualquer lugar do mundo</p>

    <div id="status">Conectando ao broker...</div>
    <button id="btnLigar" onclick="ligarPC()" disabled>Ligar Computador</button>
    <div id="trocarToken" onclick="trocarToken()">Trocar token de acesso</div>
</div>

<script>
// ===== CONFIGURAÇÃO - preencha com os mesmos dados do config.h do ESP32 =====
const MQTT_BROKER = "wss://9ec6a439faec488a83dfca692d4b7932.s1.eu.hivemq.cloud:8884/mqtt";
const MQTT_USER = "wakehub_user";
const MQTT_PASSWORD = "sua_senha_aqui";
const MQTT_TOPIC = "wakehub/wake";
const MQTT_STATUS_TOPIC = "wakehub/status";
// O token não fica mais fixo no código - é pedido na primeira vez
// e guardado no navegador (localStorage).
// =============================================================================

const statusEl = document.getElementById("status");
const btnEl = document.getElementById("btnLigar");

function obterToken(forcarNovo = false)
{
    if (forcarNovo)
    {
        localStorage.removeItem("wakehub_token");
    }

    let token = localStorage.getItem("wakehub_token");
    if (!token)
    {
        token = prompt("Digite o token de acesso do WakeHub:");
        if (token)
        {
            localStorage.setItem("wakehub_token", token);
        }
    }
    return token;
}

const client = mqtt.connect(MQTT_BROKER, {
    username: MQTT_USER,
    password: MQTT_PASSWORD,
    clientId: "wakehub-web-" + Math.random().toString(16).slice(2)
});

client.on("connect", () => {
    statusEl.textContent = "Conectado! Pronto para ligar o PC.";
    btnEl.disabled = false;
    client.subscribe(MQTT_STATUS_TOPIC);
});

client.on("message", (topic, message) => {
    if (topic !== MQTT_STATUS_TOPIC) return;

    const status = message.toString();

    if (status === "ligado")
    {
        statusEl.textContent = "✅ O computador ligou!";
    }
    else if (status === "sem_resposta")
    {
        statusEl.textContent = "⚠️ O PC não respondeu. Confira se ligou manualmente.";
    }
});

client.on("error", (err) => {
    statusEl.textContent = "Erro de conexão: " + err.message;
    btnEl.disabled = true;
});

client.on("close", () => {
    statusEl.textContent = "Desconectado do broker...";
    btnEl.disabled = true;
});

function trocarToken()
{
    obterToken(true);
}

function ligarPC()
{
    const token = obterToken();
    if (!token) return;

    btnEl.disabled = true;
    statusEl.textContent = "Comando enviado! Aguardando o PC ligar...";

    client.publish(MQTT_TOPIC, token, {}, (err) => {
        if (err)
        {
            statusEl.textContent = "Erro ao enviar: " + err.message;
        }
        btnEl.disabled = false;
    });
}
</script>
</body>
</html>
