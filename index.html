<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WakeHub</title>

<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a2850">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    /* Valores padrão - são substituídos automaticamente
       quando você escolhe uma nova imagem de fundo. */
    --accent-r: 30;
    --accent-g: 90;
    --accent-b: 160;
}

body{
    font-family:'Poppins', Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
    position:relative;
    transition:background-image .4s ease;

    background-image:
        linear-gradient(180deg, rgba(10,40,80,.55), rgba(10,40,80,.75)),
        url("background.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

.card{
    width:440px;
    max-width:100%;
    background:rgba(var(--accent-r), var(--accent-g), var(--accent-b), 0.55);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.25);
    border-radius:28px;
    padding:36px 30px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
    position:relative;
    transition:background-color .4s ease;
}

.logo{
    display:block;
    width:110px;
    height:110px;
    margin:0 auto 20px auto;
    border-radius:50%;
    object-fit:cover;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
}

.logo.hidden{
    display:none;
}

h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:44px;
    color:#ffffff;
    text-shadow:0 3px 10px rgba(0,0,0,.3);
    letter-spacing:1px;
    margin-bottom:14px;
}

.subtitle{
    font-family:'Baloo 2', sans-serif;
    font-weight:500;
    font-size:15px;
    color:#e8f1ff;
    text-transform:uppercase;
    letter-spacing:.5px;
    margin-bottom:22px;
    line-height:1.4;
}

#status{
    font-size:13px;
    color:#cfe0f5;
    margin-bottom:26px;
    min-height:18px;
}

button{
    width:100%;
    padding:17px;
    border:none;
    border-radius:50px;
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.4);
    color:#ffffff;
    font-family:'Poppins', sans-serif;
    font-weight:600;
    font-size:16px;
    cursor:pointer;
    transition:.25s;
}

button:hover:not(:disabled){
    background:rgba(255,255,255,.3);
    transform:translateY(-1px);
}

button:disabled{
    background:rgba(255,255,255,.08);
    color:rgba(255,255,255,.5);
    cursor:not-allowed;
}

button:active:not(:disabled){
    transform:translateY(0);
}

.linkSecundario{
    margin-top:14px;
    font-size:12px;
    color:rgba(255,255,255,.55);
    cursor:pointer;
    text-decoration:underline;
    display:inline-block;
    margin-right:14px;
}

.linkSecundario:hover{
    color:rgba(255,255,255,.85);
}

/* ===== Botão de engrenagem (abre o painel de personalização) ===== */
#btnConfig{
    position:absolute;
    top:18px;
    right:18px;
    width:36px;
    height:36px;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.3);
    color:#fff;
    font-size:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.2s;
}

#btnConfig:hover{
    background:rgba(255,255,255,.3);
    transform:rotate(45deg);
}

/* ===== Painel/modal de personalização ===== */
#overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    z-index:10;
    align-items:center;
    justify-content:center;
    padding:20px;
}

#overlay.aberto{
    display:flex;
}

#painel{
    width:400px;
    max-width:100%;
    background:#12233d;
    border:1px solid rgba(255,255,255,.15);
    border-radius:22px;
    padding:28px 26px;
    color:#fff;
    max-height:85vh;
    overflow-y:auto;
    position:relative;
}

#painel h2{
    font-family:'Baloo 2', sans-serif;
    font-size:24px;
    margin-bottom:6px;
}

#painel p.desc{
    font-size:12px;
    color:rgba(255,255,255,.6);
    margin-bottom:20px;
    line-height:1.5;
}

.campoPainel{
    margin-bottom:18px;
    text-align:left;
}

.campoPainel label{
    display:block;
    font-size:13px;
    font-weight:600;
    margin-bottom:8px;
    color:rgba(255,255,255,.85);
}

.campoPainel input[type="file"]{
    width:100%;
    font-size:12px;
    color:rgba(255,255,255,.8);
}

.previewImg{
    margin-top:10px;
    width:100%;
    max-height:110px;
    object-fit:cover;
    border-radius:10px;
    display:none;
}

.previewImg.mostrar{
    display:block;
}

.botoesPainel{
    display:flex;
    gap:10px;
    margin-top:24px;
}

.botoesPainel button{
    font-size:13px;
    padding:13px;
}

#btnRestaurar{
    background:rgba(255,255,255,.08);
    border-color:rgba(255,255,255,.2);
}

#btnFechar{
    position:absolute;
    top:14px;
    right:18px;
    background:none;
    border:none;
    color:rgba(255,255,255,.6);
    font-size:20px;
    width:auto;
    padding:0;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
    <button id="btnConfig" onclick="abrirPainel()" title="Personalizar">⚙️</button>

    <img id="logoImg" class="logo hidden" src="" alt="Logo">

    <h1>WAKEHUB</h1>
    <p class="subtitle">Ligue o computador de qualquer lugar do mundo</p>

    <div id="status">Conectando ao broker...</div>
    <button id="btnLigar" onclick="ligarPC()" disabled>Ligar Computador</button>

    <div style="margin-top:14px;">
        <span class="linkSecundario" onclick="trocarToken()">Trocar token</span>
    </div>
</div>

<!-- Painel de personalização -->
<div id="overlay">
    <div id="painel">
        <button id="btnFechar" onclick="fecharPainel()">✕</button>
        <h2>Personalizar</h2>
        <p class="desc">Escolha uma imagem de fundo e um logo. As cores do card se ajustam automaticamente com base na imagem de fundo escolhida. Tudo fica salvo só neste navegador.</p>

        <div class="campoPainel">
            <label>Imagem de fundo</label>
            <input type="file" id="inputFundo" accept="image/*">
            <img id="previewFundo" class="previewImg">
        </div>

        <div class="campoPainel">
            <label>Logo (opcional)</label>
            <input type="file" id="inputLogo" accept="image/*">
            <img id="previewLogo" class="previewImg" style="max-height:80px; width:80px; border-radius:50%;">
        </div>

        <div class="botoesPainel">
            <button id="btnRestaurar" onclick="restaurarPadrao()">Restaurar padrão</button>
            <button id="btnSalvarPainel" onclick="salvarPersonalizacao()">Salvar</button>
        </div>
    </div>
</div>

<script>
// ===== CONFIGURAÇÃO - preencha com os mesmos dados do config.h do ESP32 =====
const MQTT_BROKER = "wss://9ec6a439faec488a83dfca692d4b7932.s1.eu.hivemq.cloud:8884/mqtt";
const MQTT_USER = "WakeHubUser";
const MQTT_PASSWORD = "230107";
const MQTT_TOPIC = "wakehub/wake";
const MQTT_STATUS_TOPIC = "wakehub/status";
// O token não fica fixo no código - é pedido na primeira vez
// e guardado no navegador (localStorage).
// =============================================================================

const statusEl = document.getElementById("status");
const btnEl = document.getElementById("btnLigar");
const logoImg = document.getElementById("logoImg");

/* ============================================================
   PERSONALIZAÇÃO (fundo, logo, cor automática)
   Tudo fica salvo no localStorage deste navegador.
   ============================================================ */

function aplicarFundo(base64)
{
    document.body.style.backgroundImage =
        `linear-gradient(180deg, rgba(10,40,80,.55), rgba(10,40,80,.75)), url("${base64}")`;
    extrairCorDominante(base64);
}

function aplicarLogo(base64)
{
    if (base64)
    {
        logoImg.src = base64;
        logoImg.classList.remove("hidden");
    }
    else
    {
        logoImg.classList.add("hidden");
    }
}

// Lê a imagem de fundo, tira a média de cor dos pixels e aplica
// como cor do card automaticamente (via variáveis CSS).
function extrairCorDominante(base64)
{
    const img = new Image();
    img.onload = () => {
        const canvas = document.createElement("canvas");
        const tamanho = 40; // reduz a imagem só pra amostragem, mais rápido
        canvas.width = tamanho;
        canvas.height = tamanho;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, tamanho, tamanho);

        let r = 0, g = 0, b = 0, total = 0;
        try
        {
            const dados = ctx.getImageData(0, 0, tamanho, tamanho).data;
            for (let i = 0; i < dados.length; i += 4)
            {
                r += dados[i];
                g += dados[i + 1];
                b += dados[i + 2];
                total++;
            }
            r = Math.round(r / total);
            g = Math.round(g / total);
            b = Math.round(b / total);

            // Escurece um pouco a média pra manter bom contraste com o texto branco
            r = Math.round(r * 0.55);
            g = Math.round(g * 0.55);
            b = Math.round(b * 0.65);

            document.documentElement.style.setProperty("--accent-r", r);
            document.documentElement.style.setProperty("--accent-g", g);
            document.documentElement.style.setProperty("--accent-b", b);
        }
        catch (e)
        {
            console.log("Não foi possível extrair a cor da imagem:", e);
        }
    };
    img.src = base64;
}

function carregarPersonalizacaoSalva()
{
    const fundoSalvo = localStorage.getItem("wakehub_bg");
    const logoSalvo = localStorage.getItem("wakehub_logo");

    if (fundoSalvo) aplicarFundo(fundoSalvo);
    if (logoSalvo) aplicarLogo(logoSalvo);
}

function arquivoParaBase64(arquivo)
{
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(arquivo);
    });
}

function abrirPainel()
{
    document.getElementById("overlay").classList.add("aberto");

    const fundoSalvo = localStorage.getItem("wakehub_bg");
    const logoSalvo = localStorage.getItem("wakehub_logo");
    const prevFundo = document.getElementById("previewFundo");
    const prevLogo = document.getElementById("previewLogo");

    if (fundoSalvo)
    {
        prevFundo.src = fundoSalvo;
        prevFundo.classList.add("mostrar");
    }
    if (logoSalvo)
    {
        prevLogo.src = logoSalvo;
        prevLogo.classList.add("mostrar");
    }
}

function fecharPainel()
{
    document.getElementById("overlay").classList.remove("aberto");
}

document.getElementById("inputFundo").addEventListener("change", async (e) => {
    const arquivo = e.target.files[0];
    if (!arquivo) return;
    const base64 = await arquivoParaBase64(arquivo);
    const prev = document.getElementById("previewFundo");
    prev.src = base64;
    prev.classList.add("mostrar");
});

document.getElementById("inputLogo").addEventListener("change", async (e) => {
    const arquivo = e.target.files[0];
    if (!arquivo) return;
    const base64 = await arquivoParaBase64(arquivo);
    const prev = document.getElementById("previewLogo");
    prev.src = base64;
    prev.classList.add("mostrar");
});

async function salvarPersonalizacao()
{
    const inputFundo = document.getElementById("inputFundo");
    const inputLogo = document.getElementById("inputLogo");

    try
    {
        if (inputFundo.files[0])
        {
            const base64 = await arquivoParaBase64(inputFundo.files[0]);
            localStorage.setItem("wakehub_bg", base64);
            aplicarFundo(base64);
        }

        if (inputLogo.files[0])
        {
            const base64 = await arquivoParaBase64(inputLogo.files[0]);
            localStorage.setItem("wakehub_logo", base64);
            aplicarLogo(base64);
        }

        fecharPainel();
    }
    catch (e)
    {
        alert("Não foi possível salvar - a imagem pode ser muito grande. Tenta uma imagem menor/comprimida.");
    }
}

function restaurarPadrao()
{
    localStorage.removeItem("wakehub_bg");
    localStorage.removeItem("wakehub_logo");
    document.body.style.backgroundImage = "";
    aplicarLogo(null);
    document.documentElement.style.setProperty("--accent-r", 30);
    document.documentElement.style.setProperty("--accent-g", 90);
    document.documentElement.style.setProperty("--accent-b", 160);

    document.getElementById("inputFundo").value = "";
    document.getElementById("inputLogo").value = "";
    document.getElementById("previewFundo").classList.remove("mostrar");
    document.getElementById("previewLogo").classList.remove("mostrar");

    fecharPainel();
}

carregarPersonalizacaoSalva();

/* ============================================================
   TOKEN
   ============================================================ */

function obterToken(forcarNovo = false)
{
    if (forcarNovo)
    {
        localStorage.removeItem("wakehub_token");
    }

    let token = localStorage.getItem("wakehub_token");
    if (!token)
    {
        token = prompt("Digite o token de acesso do WakeHub:");
        if (token)
        {
            localStorage.setItem("wakehub_token", token);
        }
    }
    return token;
}

function trocarToken()
{
    obterToken(true);
}

/* ============================================================
   MQTT
   ============================================================ */

const client = mqtt.connect(MQTT_BROKER, {
    username: MQTT_USER,
    password: MQTT_PASSWORD,
    clientId: "wakehub-web-" + Math.random().toString(16).slice(2)
});

client.on("connect", () => {
    statusEl.textContent = "Conectado! Pronto para ligar o PC.";
    btnEl.disabled = false;
    client.subscribe(MQTT_STATUS_TOPIC);
});

client.on("message", (topic, message) => {
    if (topic !== MQTT_STATUS_TOPIC) return;

    const status = message.toString();

    if (status === "ligado")
    {
        statusEl.textContent = "✅ O computador ligou!";
    }
    else if (status === "sem_resposta")
    {
        statusEl.textContent = "⚠️ O PC não respondeu. Confira se ligou manualmente.";
    }
});

client.on("error", (err) => {
    statusEl.textContent = "Erro de conexão: " + err.message;
    btnEl.disabled = true;
});

client.on("close", () => {
    statusEl.textContent = "Desconectado do broker...";
    btnEl.disabled = true;
});

function ligarPC()
{
    const token = obterToken();
    if (!token) return;

    btnEl.disabled = true;
    statusEl.textContent = "Comando enviado! Aguardando o PC ligar...";

    client.publish(MQTT_TOPIC, token, {}, (err) => {
        if (err)
        {
            statusEl.textContent = "Erro ao enviar: " + err.message;
        }
        btnEl.disabled = false;
    });
}

// Registra o Service Worker (necessário para a instalação completa do PWA)
if ("serviceWorker" in navigator)
{
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((err) => {
            console.log("Falha ao registrar Service Worker:", err);
        });
    });
}
</script>
</body>
</html>
